<!DOCTYPE html>
<html>
<head>
    <title>My Orders - Baking Mellow</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .orders-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 { text-align: center; color: #5c4636; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #b69b72;
            color: white;
        }
        .loading { text-align: center; padding: 40px; font-size: 18px; }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin: 20px 0;
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            text-decoration: none;
            color: #b69b72;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </div>
    <div class="icons">
        <a href="login.html">🔑</a>
        <a href="cart.html">🛒</a>
    </div>
</div>

<div class="orders-container">
    <h1>📦 Your Order History</h1>
    
    <div id="ordersContent">
        <div class="loading">Loading your orders...</div>
    </div>

    <a href="home.html" class="back-btn">← Back to Home</a>
</div>

<script>
    async function loadOrders() {
        const contentDiv = document.getElementById('ordersContent');

        try {
            const response = await fetch('/api/auth/me', {
                credentials: 'include'
            });

            if (!response.ok) {
                contentDiv.innerHTML = `
                    <div class="error-message">
                        ⚠️ Please login to view your orders
                        <br><br>
                        <a href="login.html" style="color: #5c4636; font-weight: bold;">Login Here</a>
                    </div>
                `;
                return;
            }

            const ordersResponse = await fetch('/api/orders', {
                credentials: 'include'
            });

            const data = await ordersResponse.json();

            if (data.orders && data.orders.length > 0) {
                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Total Amount</th>
                                <th>Status</th>
                                <th>Order Date</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.orders.forEach(order => {
                    tableHTML += `
                        <tr>
                            <td>#${order._id.slice(-6)}</td>
                            <td>Rs ${order.total}</td>
                            <td><span style="color: green;">${order.status}</span></td>
                            <td>${new Date(order.orderDate).toLocaleDateString()}</td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table>`;
                contentDiv.innerHTML = tableHTML;
            } else {
                contentDiv.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #888;">
                        🧁 You haven't placed any orders yet.<br>
                        <a href="menu.html" style="color: #b69b72;">Start shopping!</a>
                    </div>
                `;
            }
        } catch (error) {
            contentDiv.innerHTML = `
                <div class="error-message">
                    Error loading orders. Please try again later.
                </div>
            `;
        }
    }

    // Load orders on page load
    loadOrders();
</script>

</body>
</html>
